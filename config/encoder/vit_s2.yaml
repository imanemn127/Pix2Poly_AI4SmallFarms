name: vit

use_images: true
use_lidar: false

type: vit_small_patch8_224.dino   
checkpoint_file: /mnt/DATA/IMANE/PixelsPointsPolygons_output/backbones/dino_deitsmall8_pretrain.pth
pretrained: True

# image input dimensions
in_size: 32
in_height: ${.in_size}
in_width:  ${.in_size}

# patching
patch_size: 4                   # was 2 — 4×4 px tokens (40m×40m) give 64 tokens vs 256, easier cross-attention
patch_feature_size: 8           # was 16 — 32 / 4
patch_feature_height: ${.patch_feature_size}
patch_feature_width:  ${.patch_feature_size}
patch_feature_dim: 384
num_patches: 64                  # was 256 — (32 / 4)^2

out_feature_dim: ${..model.decoder.in_feature_dim}

# Sentinel-2 uint16: reflectance scaled ×10000
# Stats computed on 11579 train patches (bands 1,2,3) — was [0,0,0]/[1,1,1]
image_mean: [0.2416, 0.1120, 0.1008]
image_std:  [0.0694, 0.0510, 0.0324]
image_max_pixel_value: 10000.0

augmentations:
  - D4
  - Normalize