name: pix2poly

decoder:
  in_feature_size:   ${...encoder.patch_feature_size}
  in_feature_width:  ${.in_feature_size}
  in_feature_height: ${.in_feature_size}
  in_feature_dim: 256

tokenizer:
  num_bins: 32
  shuffle_tokens: false
  max_num_vertices: 192
  max_len: null          # computed at runtime: 192*2+2 = 386
  pad_idx: null          # computed at runtime: 35 (32+BOS+EOS+PAD)
  generation_steps: 385

shuffle_polygons: true

fusion: patch_concat

# optimization
sinkhorn_iterations: 100
vertex_loss_weight: 10.0  # was 1.0 — decoder collapsed to constant token, coords need stronger signal
perm_loss_weight: 3.0  # reduced from 10.0 — dense perm matrix overwhelmed coord signal

# training
batch_size:   ${...run_type.batch_size}
start_epoch: 0
num_epochs: 100
learning_rate: 3e-4
weight_decay:  1e-4
